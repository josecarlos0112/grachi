<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Audiencia de Pruebas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --cream: #f0e4d7;
    --pink: #f9d5e5;
    --pink2: #f3bcd4;
    --accent: #d81159;
    --gold: #c9a227;
    --ink: #3a2e2e;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--cream);
    font-family: 'Segoe UI', Arial, sans-serif;
    color: var(--ink);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 16px;
  }

  .eyebrow {
    letter-spacing: 2px;
    text-transform: uppercase;
    font-size: 12px;
    color: var(--gold);
    margin: 0 0 6px;
    font-weight: 700;
    text-align: center;
  }

  h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 27px;
    margin: 0 0 6px;
    color: var(--accent);
    text-align: center;
  }

  .subtitle {
    text-align: center;
    max-width: 320px;
    margin: 0 0 28px;
    font-size: 14px;
    opacity: 0.85;
  }

  #wheelWrap {
    position: relative;
    width: 280px;
    height: 280px;
    margin-bottom: 28px;
  }

  #pointer {
    position: absolute;
    top: -6px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-top: 22px solid var(--accent);
    z-index: 5;
    filter: drop-shadow(0 2px 2px rgba(0,0,0,0.25));
  }

  #wheel {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 6px solid white;
    box-shadow: 0 0 0 4px var(--gold), 0 10px 25px rgba(0,0,0,0.25);
    position: relative;
    transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
  }

  .segment-label {
    position: absolute;
    top: 50%;
    left: 50%;
    font-size: 20px;
    transform-origin: 0 0;
    pointer-events: none;
  }

  #hub {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 46px;
    height: 46px;
    background: white;
    border: 3px solid var(--gold);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    z-index: 4;
  }

  #spinBtn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 14px 30px;
    font-size: 16px;
    border-radius: 30px;
    cursor: pointer;
    box-shadow: 0 6px 14px rgba(216,17,89,0.35);
    transition: transform 0.15s;
  }
  #spinBtn:active { transform: scale(0.96); }
  #spinBtn:disabled { opacity: 0.6; cursor: default; }

  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 4px 10px;
    border-radius: 12px;
    margin-bottom: 10px;
  }
  .badge-real { background: rgba(201,162,39,0.15); color: var(--gold); border: 1px solid var(--gold); }
  .badge-promesa { background: rgba(216,17,89,0.1); color: var(--accent); border: 1px solid var(--accent); }

  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(58,46,46,0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    z-index: 10;
  }
  .modal-bg.show { opacity: 1; pointer-events: all; }

  .modal {
    background: white;
    border-radius: 16px;
    padding: 34px 26px 26px;
    max-width: 300px;
    text-align: center;
    transform: scale(0.7);
    transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
  }
  .modal-bg.show .modal { transform: scale(1); }

  .stamp {
    display: inline-block;
    border: 3px solid var(--accent);
    color: var(--accent);
    font-family: Georgia, serif;
    font-weight: bold;
    letter-spacing: 1.5px;
    padding: 6px 14px;
    border-radius: 8px;
    transform: rotate(-8deg);
    margin-bottom: 14px;
    font-size: 13px;
  }

  #resultText {
    font-size: 16px;
    line-height: 1.5;
    margin: 0 0 20px;
  }

  #closeBtn {
    background: var(--ink);
    color: white;
    border: none;
    padding: 10px 24px;
    border-radius: 24px;
    cursor: pointer;
    font-size: 14px;
  }
</style>
</head>
<body>

  <p class="eyebrow">Causa N.º 001 — Tribunal de la Distancia</p>
  <h1>Audiencia de Pruebas</h1>
  <p class="subtitle">La distancia ya presentó su alegato. Ahora la rueda decide qué prueba de amor se admite hoy.</p>

  <div id="wheelWrap">
    <div id="pointer"></div>
    <div id="wheel"></div>
    <div id="hub">⚖️</div>
  </div>

  <button id="spinBtn">Girar la rueda</button>

  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <div class="stamp" id="stamp">VEREDICTO ⚖️</div>
      <div id="badgeWrap"></div>
      <p id="resultText"></p>
      <button id="closeBtn">Cerrar</button>
    </div>
  </div>

<script>
  /* =========================================================================
     EDITA AQUÍ: el pozo de premios. Este mismo array está duplicado en los
     5 juegos a propósito (así cada archivo sigue funcionando solo si lo
     mandas suelto por WhatsApp, sin depender de los otros). Si cambias
     algo aquí, cambia también los otros 4 archivos para mantenerlos
     coherentes entre sí.

     - tipo: "real"    → algo físico que le mandas (delivery, correo)
             "promesa" → algo para cuando se vean, o virtual
     - emoji: lo que se ve en la rueda (corto, 1 emoji)
     - texto: la frase completa que aparece en el veredicto

     Aquí, además, cada premio ES un segmento de la rueda — lo que toque
     al girar es literalmente el premio (no hay azar oculto aparte).
  ========================================================================= */
  const PREMIOS = [
    { tipo: "real",    emoji: "🌷", texto: "Delivery de flores a tu puerta, sin razón aparente." },
    { tipo: "real",    emoji: "🍫", texto: "Delivery de tus dulces favoritos, ya en camino." },
    { tipo: "real",    emoji: "📦", texto: "Un regalo físico sorpresa, en camino por correo." },
    { tipo: "real",    emoji: "💌", texto: "Una carta escrita a mano, enviada por correo postal." },
    { tipo: "promesa", emoji: "🎥", texto: "Noche de película sincronizada por videollamada. Tú eliges la fecha." },
    { tipo: "promesa", emoji: "🍽️", texto: "Cuando nos veamos: una cena, tú eliges el lugar." },
    { tipo: "promesa", emoji: "🏖️", texto: "Cuando nos veamos: un día completo de playa." },
    { tipo: "promesa", emoji: "🌳", texto: "Cuando nos veamos: un picnic en el parque." },
    { tipo: "promesa", emoji: "✈️", texto: "Promesa de visita: yo organizo el viaje." },
    { tipo: "promesa", emoji: "📞", texto: "Una llamada de una hora, sin pantallas de por medio, solo para hablar." }
  ];

  function badgeHTML(premio) {
    return premio.tipo === 'real'
      ? '<span class="badge badge-real">📬 Regalo real</span>'
      : '<span class="badge badge-promesa">🤝 Promesa</span>';
  }

  function stampFor(premio) {
    return premio.tipo === 'real' ? 'ENTREGA AUTORIZADA ⚖️' : 'PROMESA REGISTRADA ⚖️';
  }

  const colors = ["#f9d5e5", "#fbe3ec", "#f3bcd4", "#f6d0bd"];

  const wheel = document.getElementById('wheel');
  const sliceAngle = 360 / PREMIOS.length;

  let gradientParts = [];
  PREMIOS.forEach((p, i) => {
    const color = colors[i % colors.length];
    gradientParts.push(`${color} ${i * sliceAngle}deg ${(i + 1) * sliceAngle}deg`);
  });
  wheel.style.background = `conic-gradient(${gradientParts.join(',')})`;

  PREMIOS.forEach((p, i) => {
    const midAngle = (i + 0.5) * sliceAngle;
    const rad = (midAngle - 90) * Math.PI / 180;
    const radius = 95;
    const x = Math.cos(rad) * radius;
    const y = Math.sin(rad) * radius;
    const label = document.createElement('div');
    label.className = 'segment-label';
    label.textContent = p.emoji;
    label.style.transform = `translate(${x}px, ${y}px) translate(-10px,-10px)`;
    wheel.appendChild(label);
  });

  const spinBtn = document.getElementById('spinBtn');
  const modalBg = document.getElementById('modalBg');
  const resultText = document.getElementById('resultText');
  const badgeWrap = document.getElementById('badgeWrap');
  const stampEl = document.getElementById('stamp');
  const closeBtn = document.getElementById('closeBtn');

  let spinning = false;

  function spin() {
    if (spinning) return;
    spinning = true;
    spinBtn.disabled = true;

    wheel.style.transition = 'none';
    wheel.style.transform = 'rotate(0deg)';
    void wheel.offsetWidth;

    const index = Math.floor(Math.random() * PREMIOS.length);
    const midAngle = (index + 0.5) * sliceAngle;
    const target = 5 * 360 + (360 - midAngle);

    wheel.style.transition = 'transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99)';
    requestAnimationFrame(() => {
      wheel.style.transform = `rotate(${target}deg)`;
    });

    setTimeout(() => {
      const premio = PREMIOS[index];
      stampEl.textContent = stampFor(premio);
      badgeWrap.innerHTML = badgeHTML(premio);
      resultText.textContent = premio.texto;
      modalBg.classList.add('show');
      spinning = false;
      spinBtn.disabled = false;
    }, 4200);
  }

  spinBtn.addEventListener('click', spin);
  closeBtn.addEventListener('click', () => modalBg.classList.remove('show'));
</script>
</body>
</html>
